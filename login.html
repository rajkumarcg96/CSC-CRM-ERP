<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gyan ERP - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #msg { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: #2c3e50;">Gyan ERP Login</h2>
        <form id="loginForm">
            <input type="text" id="phone" placeholder="Mobile Number (e.g. 8878038225)" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="loginBtn">Login Securely</button>
            <div id="msg"></div>
        </form>
    </div>

    <script>
        // YAHAN APNA GOOGLE SCRIPT URL DALEIN
        const API_URL = "https://script.google.com/macros/s/AKfycbwpWgQgw2KoRI9Jv_Ra60ujdbweUTXU2CdL348X1EX45TQPm08T5pKOJCXasHxwiP5Fjg/exec"; 

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');
            btn.innerText = "Authenticating..."; btn.disabled = true; msg.innerText = "";

            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "login", data: { phone: document.getElementById('phone').value, password: document.getElementById('password').value } })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    msg.style.color = "green"; msg.innerText = "Login Success! Redirecting...";
                    localStorage.setItem("gyanUser", data.user.name);
                    localStorage.setItem("gyanRole", data.user.role);
                    setTimeout(() => { window.location.href = "Dashboard.html"; }, 1000);
                } else {
                    btn.disabled = false; btn.innerText = "Login Securely";
                    msg.style.color = "red"; msg.innerText = "❌ " + data.message;
                }
            }).catch(err => {
                btn.disabled = false; btn.innerText = "Login Securely";
                msg.style.color = "red"; msg.innerText = "❌ Network Error! URL check karein.";
            });
        });
    </script>
</body>
</html>
