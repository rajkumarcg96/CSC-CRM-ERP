<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service Portal - Gyan IT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 0; color: #333; }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; font-size: 22px; font-weight: bold; border-bottom: 4px solid #3498db; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-radius: 8px; overflow: hidden; background: #ddd; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; font-weight: bold; cursor: pointer; color: #555; transition: 0.3s; }
        .tab-btn.active { background: #3498db; color: white; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; background: #2ecc71; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #27ae60; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-top:5px; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-completed { background: #d4edda; color: #155724; }
        .history-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .history-item:last-child { border-bottom: none; }
        .due-alert { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-align: center; border: 1px solid #f5c6cb; }
        .doc-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 13px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 8px; font-weight:bold; transition: background 0.3s;}
        .doc-btn:hover { background: #c0392b; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="header"><i class="fas fa-desktop"></i> Gyan IT - Self Service</div>

<div class="container">
    
    <div id="authSection">
        <div class="tabs">
            <button class="tab-btn active" id="tabQuick" onclick="switchTab('quick')">Quick Track</button>
            <button class="tab-btn" id="tabLogin" onclick="switchTab('login')">Secure Login</button>
        </div>

        <div id="quickForm" class="card">
            <h3 style="text-align:center; margin-top:0; color:#34495e;">Track Application Status</h3>
            <p style="text-align:center; font-size:14px; color:#7f8c8d; margin-bottom:20px;">Apna Token/Receipt Number daalein.</p>
            <div class="form-group"><label>Token / TXN ID</label><input type="text" id="trackId" placeholder="e.g., TXN-5001"></div>
            <div class="form-group"><label>Registered Mobile Number</label><input type="text" id="trackPhone" placeholder="10 Digit Mobile"></div>
            <button class="btn" onclick="trackStatus()" id="trackBtn">Check Status</button>
            
            <div id="quickResult" style="display:none; margin-top:20px; padding:15px; background:#e8f4f8; border-radius:8px; text-align:center; border: 1px solid #d1e8ee;">
                <h4 id="resService" style="margin:0 0 5px 0; color:#2c3e50;"></h4>
                <span id="resStatus" class="status-badge"></span>
                <p id="resDate" style="font-size:12px; color:#7f8c8d; margin:10px 0 0 0;"></p>
                <a id="resDoc" href="#" target="_blank" class="doc-btn" style="display:none;"><i class="fas fa-file-download"></i> Download Document</a>
            </div>
        </div>

        <div id="loginForm" class="card" style="display:none;">
            <h3 style="text-align:center; margin-top:0; color:#34495e;">Customer Dashboard</h3>
            <p style="text-align:center; font-size:14px; color:#7f8c8d; margin-bottom:20px;">Apni detail dekhne ke liye login karein.</p>
            <div class="form-group"><label>Registered Mobile Number</label><input type="text" id="logPhone" placeholder="10 Digit Mobile"></div>
            <div class="form-group"><label>Date of Birth (DOB)</label><input type="date" id="logDob"></div>
            <button class="btn" style="background:#3498db;" onclick="customerLogin()" id="loginBtn">Login Securely</button>
        </div>
    </div>

    <div id="dashSection" style="display:none;">
        <h2 id="welcomeText" style="color:#2c3e50; text-align:center;"></h2>
        <div id="dueAlert" class="due-alert" style="display:none;"></div>
        
        <div class="card">
            <h3 style="margin-top:0; color:#e67e22; border-bottom: 2px solid #eee; padding-bottom:10px;"><i class="fas fa-spinner"></i> In-Process Work</h3>
            <div id="activeList">Loading...</div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; color:#2ecc71; border-bottom: 2px solid #eee; padding-bottom:10px;"><i class="fas fa-check-circle"></i> Service History & Downloads</h3>
            <div id="historyList"></div>
        </div>
        
        <button class="btn" onclick="location.reload()" style="background:#7f8c8d; margin-bottom:10px;">Logout</button>
    </div>

</div>

<div class="footer">Powered by Gyan IT Center</div>

<script>
    // ⚠️ KHEMRAJ BHAI KA FINAL API URL ⚠️
    const API_URL = "https://script.google.com/macros/s/AKfycbyhfNb1GCKUGX8tacDlZPqQdI-iB7vRSfiStRbVWjySFOvWzxkw_yQn7YIU7SQYaaOxLA/exec"; 

    function switchTab(tab) {
        document.getElementById('tabQuick').classList.remove('active');
        document.getElementById('tabLogin').classList.remove('active');
        document.getElementById('quickForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('quickResult').style.display = 'none';
        if(tab === 'quick') {
            document.getElementById('tabQuick').classList.add('active');
            document.getElementById('quickForm').style.display = 'block';
        } else {
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('loginForm').style.display = 'block';
        }
    }

    function trackStatus() {
        let btn = document.getElementById('trackBtn'); let originalText = btn.innerText; btn.innerText = "Checking...";
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "trackStatus", data: { txnId: document.getElementById('trackId').value, phone: document.getElementById('trackPhone').value } }) })
        .then(res => res.json()).then(d => {
            btn.innerText = originalText;
            if(d.status === "success") {
                document.getElementById('quickResult').style.display = 'block';
                document.getElementById('resService').innerText = d.user.service;
                let badge = document.getElementById('resStatus');
                badge.innerText = d.user.status;
                badge.className = "status-badge " + (d.user.status === "Completed" ? "status-completed" : "status-pending");
                document.getElementById('resDate').innerText = "Applied on: " + new Date(d.user.date).toLocaleDateString();

                if(d.user.status === "Completed" && d.user.docUrl && d.user.docUrl !== "") {
                    document.getElementById('resDoc').href = d.user.docUrl;
                    document.getElementById('resDoc').style.display = 'inline-block';
                } else { document.getElementById('resDoc').style.display = 'none'; }
            } else { alert(d.message); document.getElementById('quickResult').style.display = 'none'; }
        }).catch(err => { alert("Network error! Please try again."); btn.innerText = originalText; });
    }

    function customerLogin() {
        let btn = document.getElementById('loginBtn'); let originalText = btn.innerText; btn.innerText = "Logging in...";
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "customerLogin", data: { phone: document.getElementById('logPhone').value, dob: document.getElementById('logDob').value } }) })
        .then(res => res.json()).then(d => {
            btn.innerText = originalText;
            if(d.status === "success") {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('dashSection').style.display = 'block';
                document.getElementById('welcomeText').innerText = "Hello, " + d.user.name;
                
                if(Number(d.user.udhar) > 0) {
                    document.getElementById('dueAlert').style.display = 'block';
                    document.getElementById('dueAlert').innerText = "⚠️ Dhyan Dein: Aapka purana udhar ₹" + d.user.udhar + " bacha hai.";
                }

                let aList = document.getElementById('activeList'); aList.innerHTML = "";
                if(d.user.active.length === 0) aList.innerHTML = "<p style='color:#7f8c8d; font-size:14px; text-align:center;'>Aapka koi kaam In-Process nahi hai.</p>";
                d.user.active.forEach(item => {
                    aList.innerHTML += `<div class="history-item"><div style="font-weight:bold; font-size:16px;">${item.service} <span style="float:right; font-size:12px; color:#7f8c8d;">${item.id}</span></div><div style="margin-top:5px;"><span class="status-badge status-pending">${item.status}</span></div></div>`;
                });

                let hList = document.getElementById('historyList'); hList.innerHTML = "";
                if(d.user.history.length === 0) hList.innerHTML = "<p style='color:#7f8c8d; font-size:14px; text-align:center;'>Koi purana record nahi mila.</p>";
                d.user.history.forEach(item => {
                    let docBtn = (item.docUrl && item.docUrl !== "") ? `<a href="${item.docUrl}" target="_blank" class="doc-btn"><i class="fas fa-file-download"></i> Download Document</a>` : "";
                    hList.innerHTML += `<div class="history-item"><div style="font-weight:bold; font-size:16px;">${item.service} <span style="float:right; font-size:12px; color:#7f8c8d;">${new Date(item.date).toLocaleDateString()}</span></div><div style="margin-top:5px; font-size:14px; color:#555;">Total Paid: ₹${item.amount}</div><div style="margin-top:5px; display:flex; justify-content:space-between; align-items:center;"><span class="status-badge status-completed">${item.status}</span> ${docBtn}</div></div>`;
                });
            } else { alert(d.message); }
        }).catch(err => { alert("Network error! Please try again."); btn.innerText = originalText; });
    }
</script>
</body>
</html>
