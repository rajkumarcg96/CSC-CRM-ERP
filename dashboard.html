<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #ffffff;
        }
        .toggle-dark-mode {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            padding: 10px;
            border-radius: 5px;
        }
        .card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 15px;
            padding: 20px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        /* Additional styles for dashboard elements */
    </style>
</head>
<body>
    <button class="toggle-dark-mode">Toggle Dark Mode</button>
    <div class="dashboard">
        <h1>Dashboard</h1>
        <div class="analytics-widgets">
            <!-- Advanced analytics widgets with charts -->
        </div>
        <div class="quick-action-cards">
            <!-- Quick action cards for tasks -->
        </div>
        <div class="notification-panel">
            <!-- Notification panel with alerts -->
        </div>
        <div class="real-time-clock">
            <!-- Real-time clock display -->
        </div>
        <div class="performance-metrics">
            <!-- Performance metrics section -->
        </div>
        <input type="search" placeholder="Search..." />
        <script>
            // JavaScript for toggling dark mode, lazy loading, improved search with filters
            document.querySelector('.toggle-dark-mode').onclick = function() {
                document.body.classList.toggle('dark-mode');
            };
        </script>
    </div>
</body>
</html>
